# Site settings
title: "Krishna GPT: Lessons from Sri Krishna"
description: "An interactive guide to Krishna's teachings across sacred texts, starting with the Bhagavad Gita"
baseurl: "/krishna-gpt"
url: "https://sanatan-learnings.github.io"

# Collections
collections:
  verses:
    output: true
    permalink: /:collection/:name/

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - scripts/
  - venv/
  - .env
  - .env.example
  - requirements.txt
  - wrangler.toml
  - workers/
  - "**/*.temp.mp3"

# Defaults
defaults:
  - scope:
      path: ""
      type: "verses"
    values:
      layout: "verse"
